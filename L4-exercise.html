<style>
    .back {
        background-color: rgb(229, 229, 245);
        border-radius: 3px ;
        border-width: 1px ;
        padding-bottom: 10px;
        padding-top: 10px;
        padding-left:9px ;
        padding-right: 9px;
        font-size: 18px;
        margin-right: 15px;
    }
    .search{
        margin-left: 4px;
        margin-right: 4px;
        font-size: 16px;
    }
    .next{
        background-color: rgb(229, 229, 245);
        border-radius: 3px ;
        border-width: 1px ;
        padding-bottom: 10px;
        padding-top: 10px;
        padding-left:9px ;
        padding-right: 9px;
        font-size: 18px;
        margin-left: 15px;
    }
    
    .stretch{
        background-color: green;
        color: white;
        border: none;
        font-size: 18px;
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 5px;
        padding-bottom: 5px;
        cursor: pointer;
        border: none;
        box-shadow: 2px;
    }
    .stretch:hover{
        padding-right: 36px;
        padding-bottom: 36px;
        transition: 0.5s ease-in-out;
    }
    .shadow{
        background-color: green;
        color: white;
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 5px;
        padding-bottom: 5px;
        border: none;
        box-shadow:0 4px 16px 0 rgba(0,0,0,0.6);
        transition: 0.3s;
        cursor: pointer;
    }
    .shadow:active{
        box-shadow: none;
    }
    .one {
        background-color: green;
        color: white;
        border: none;
        font-size: 18px;
        padding-top: 8px;
        padding-bottom: 8px;
        cursor: pointer;

        padding-left: 15px;
        padding-right: 15px;
        margin-left: 10px;
        margin-right: 10px;

        transition: padding 0.15s,
         margin 0.15s;
    }
    .one:hover{
        padding-left: 25px;
        padding-right: 25px;
        margin-left: 0px;
        margin-right: 0px;
        
    }
    
</style>
<button class="back">Back</button>
