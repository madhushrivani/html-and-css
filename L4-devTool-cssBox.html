<style>
.subscribe-button {
        background-color: rgb(204,0,0);
        color: white;
        border: none;
        border-radius: 2px;
        cursor: pointer;

        margin-right: 12px;
        padding-right: 16px;
        padding-left: 16px;
        padding-top:10px ;
        padding-bottom: 10px;

    }
    .subscribe-button:hover{
        opacity: 0.7;
        transition: 0.3s;
    }
    .subscribe-button:active{
        opacity: 0.5;
    }
    .join-button {
        background-color: white;
        border-color: rgb(6,95,212);
        color: rgb(6,95,212);
        border-style: solid ;
        border-width: 1px;
        color: rgbrgb(6,95,212);
        border-radius: 2px;
        cursor: pointer;
        margin-right: 15px;
        padding-right: 15px;
        padding-left: 15px;
        padding-top: 9px;
        padding-bottom: 9px;

    }
    .join-button:hover{
        background-color:rgb(6,95,212) ;
        transition: 0.3s;
        color: white;
    }
    .join-button:active{
        opacity: 0.7;
    }
    .tweet-button {
        background-color: rgb(38, 151, 244);
        border: none;
        color: white;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        margin-left: 8px;
        padding-bottom: 9px;
        padding-left: 16px;
        padding-right:16px ;
        padding-top:9px ;
    }
    .tweet-button:hover{
        box-shadow: 5px 5px 30px rgb(18, 70, 113);
        transition: 0.3s;
    }
    
</style>
<button class="subscribe-button"> SUBSCRIBE   </button>
<button class="join-button"> JOIN </button>
<button class="tweet-button"> Tweet </button>
