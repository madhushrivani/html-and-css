<style>
    .subscribe-button {
        background-color: rgb(192, 29, 29);
        color: white;
        border: none;
        height: 37px;
        width: 132px;
        border-radius: 2px;
        cursor: pointer;
    }
    .subscribe-button:hover{
        opacity: 0.7;
        transition: 0.3s;
    }
    .subscribe-button:active{
        opacity: 0.5;
    }
    .join-button {
        background-color: white;
        border-color: rgb(8, 86, 181);
        border-style: solid ;
        border-width: 1px;
        color: rgb(8,86,181);
        width: 70px;
        height: 37px ;
        border-radius: 2px;
        cursor: pointer;
        margin-left: 8px;
    }
    .join-button:hover{
        background-color:rgb(8, 86, 181) ;
        transition: 0.3s;
        color: white;
    }
    .join-button:active{
        opacity: 0.7;
    }
    .tweet-button {
        background-color: rgb(38, 151, 244);
        border: none;
        color: white;
        border-radius: 25px;
        width: 80px;
        height: 37px;
        cursor: pointer;
        font-weight: bold;
        margin-left: 8px;
    }
    .tweet-button:hover{
        box-shadow: 5px 5px 30px rgb(18, 70, 113);
        transition: 0.3s;
    }
    
</style>
<button class="subscribe-button"> SUBSCRIBE   </button>
<button class="join-button"> JOIN </button>
<button class="tweet-button"> Tweet </button>
